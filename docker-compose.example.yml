version: '3.8'

# 生产环境 Docker Compose 配置示例
# 使用方法：
#   1. 复制此文件为 docker-compose.yml: cp docker-compose.example.yml docker-compose.yml
#   2. 创建 .env 文件配置敏感信息（参考 .env.example）
#   3. 启动服务: docker-compose up -d

services:
  app:
    image: ghcr.io/${GITHUB_USERNAME:-your-username}/${PROJECT_NAME:-go-ddd-template}:${VERSION:-latest}
    container_name: myapp
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"

    # 环境变量配置（优先级最高）
    environment:
      # ========== 必需配置（必须通过 .env 文件或环境变量设置） ==========

      # JWT 配置（生产环境必须修改）
      APP_JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required}"  # 至少 32 字符的强随机字符串

      # 数据库配置
      APP_DATA_PGSQL_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-myapp}?sslmode=disable"

      # Redis 配置（如需密码认证）
      APP_DATA_REDIS_URL: "redis://${REDIS_PASSWORD:+:${REDIS_PASSWORD}@}redis:6379/0"

      # 认证配置
      APP_AUTH_DEV_SECRET: "${DEV_SECRET:?DEV_SECRET is required}"  # 开发模式密钥（验证码开发模式）

      # ========== 可选配置（已在 config.yaml 中设置默认值） ==========

      # 服务器配置
      # APP_SERVER_ADDR: "0.0.0.0:8080"
      # APP_SERVER_ENV: "production"
      # APP_SERVER_STATIC_DIR: "/apps/data/public/web"
      # APP_SERVER_DOCS_DIR: "/apps/data/public/docs"

      # Redis 配置
      # APP_DATA_REDIS_KEY_PREFIX: "myapp:"
      # APP_DATA_AUTO_MIGRATE: "false"  # 生产环境建议手动执行迁移

      # JWT 有效期
      # APP_JWT_ACCESS_TOKEN_EXPIRY: "15m"
      # APP_JWT_REFRESH_TOKEN_EXPIRY: "168h"  # 7 天

      # 认证配置
      # APP_AUTH_TWOFA_ISSUER: "Go-DDD-Template"
      # APP_AUTH_CAPTCHA_REQUIRED: "true"

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

    networks:
      - app-network

    # 健康检查
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:15-alpine
    container_name: myapp-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-myapp}
      PGDATA: /var/lib/postgresql/data/pgdata

    volumes:
      - postgres-data:/var/lib/postgresql/data

    networks:
      - app-network

    # 健康检查
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: myapp-redis
    restart: unless-stopped

    # 如需启用密码认证，取消下面的注释
    # command: redis-server --requirepass ${REDIS_PASSWORD}

    volumes:
      - redis-data:/data

    networks:
      - app-network

    # 健康检查
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  app-network:
    driver: bridge
