# Pre-commit hooks configuration
# See https://pre-commit.com for more information

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=512"]

  # 本地自定义检查
  - repo: local
    hooks:
      # Go 代码静态检查（仅检查本次提交修改的代码）
      - id: golangci-lint
        name: Run golangci-lint on new changes
        entry: golangci-lint run --new --fix
        language: system
        pass_filenames: false
        stages: [pre-commit]
        files: \.go$

      # Swagger/OpenAPI 文档生成
      - id: swagger-generate
        name: Generate Swagger/OpenAPI docs
        entry: scripts/hooks/swagger-pre-commit.sh
        language: script
        pass_filenames: false
        stages: [pre-commit]
        files: ^internal/(adapters/http/handler|commands/api)/.*\.go$

      # VitePress 文档构建检查
      - id: vitepress-build
        name: Build VitePress docs when docs/ changes
        entry: scripts/hooks/docs-build-pre-commit.sh
        language: script
        pass_filenames: false
        stages: [pre-commit]
        files: ^docs/

# 全局配置
default_stages: [pre-commit]
fail_fast: false # 不要在第一个失败时停止，运行所有检查
